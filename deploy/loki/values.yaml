# grafana/loki helm values — single-binary mode.
#
# Single binary is the right shape here: this is a lab + portfolio repo, not
# a multi-tenant logging cluster. For production scale, swap to the
# scalable/distributed mode in the same chart.

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: 'filesystem'         # local PV; for cloud, swap to s3/gcs
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  persistence:
    enabled: true
    size: 5Gi

# Disable the cache + read/write deployments that the scalable mode uses.
read:    { replicas: 0 }
write:   { replicas: 0 }
backend: { replicas: 0 }

chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Don't deploy the included Grafana — we install it separately in the
# kube-prometheus-stack pattern from the flagship repo.
grafana:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
